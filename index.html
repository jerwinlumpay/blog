        :root {
            --primary-blue: #8b6b46; /* Elegant warm bronze/gold accent */

            --text-dark: #3a2a18;

            --text-light: #ffffff;

            --card-shadow: 0 10px 40px rgba(44, 26, 4, 0.04);
            --transition-smooth: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        html {
            scroll-behavior: smooth;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            line-height: 1.75; 
            color: var(--text-dark); 
            background-color: var(--light-bg); 
        }

        .container {

            margin: 0 auto;

        }

        /* Navigation Tabs styled to match warm theme */
        .blog-nav {

            box-shadow: 0 2px 20px rgba(44,26,4,0.04);

        }
        .nav-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px 20px;

        .nav-link {

            color: var(--text-muted);

            font-size: 0.95rem;
            padding: 8px 18px;
            border-radius: 30px;
            transition: var(--transition-smooth);

        .nav-link:hover, .nav-link.active {

            background: var(--light-blue);
            box-shadow: inset 0 0 0 1px rgba(139,107,70,0.15);
        }

        /* Global Typography & Elements */

            justify-content: center;

            background: #ffffff; 
            color: var(--primary-blue); 
            text-decoration: none; 
            border-radius: 30px; 
            font-weight: 700;

            transition: var(--transition-smooth); 
            border: 1px solid rgba(139,107,70,0.2); 
            cursor: pointer; 
            box-shadow: 0 4px 14px rgba(44, 26, 4, 0.05);
        }
        .btn:hover { 
            background: var(--light-blue); 
            transform: translateY(-3px); 
            box-shadow: 0 6px 20px rgba(139,107,70,0.15);
        }
        .btn-primary {
            background: var(--primary-blue);
            color: var(--text-light);
            border: none;
            box-shadow: 0 4px 14px rgba(139, 107, 70, 0.25);
        }
        .btn-primary:hover {
            background: var(--secondary-blue);
            color: var(--text-light);
        }

            box-shadow: var(--card-shadow);

            overflow: hidden;
            transition: var(--transition-smooth);
